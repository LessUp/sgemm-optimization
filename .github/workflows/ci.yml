# Continuous Integration
# Validates code formatting and CUDA compilation

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check formatting
        uses: jidicula/clang-format-action@v4.14.0
        with:
          clang-format-version: '17'
          check-path: '.'
          exclude-regex: '(^|/)(build|third_party|external|vendor|node_modules|\.git|\.kiro)(/|$)'
          fallback-style: 'LLVM'

  cuda-build:
    name: CUDA Build
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.4.1-devel-ubuntu22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends cmake git build-essential
          rm -rf /var/lib/apt/lists/*

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF -DCMAKE_CUDA_ARCHITECTURES="70;75;80;86"

      - name: Build
        run: cmake --build build --target sgemm_benchmark -j$(nproc)

      - name: Info
        run: |
          echo "✅ CUDA compilation successful"
          echo "ℹ️  GPU runtime tests require a CUDA-capable machine"
