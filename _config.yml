# SGEMM Optimization - GitHub Pages Configuration
#
# Project: CUDA SGEMM Optimization from Naive to Tensor Core
# Repository: https://github.com/LessUp/sgemm-optimization
# Pages URL: https://lessup.github.io/sgemm-optimization

# Theme
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-default-layout

# Site info
title: SGEMM Optimization
tagline: From Naive to Tensor Core
description: >-
  Progressive CUDA SGEMM optimization with 5 kernel variants demonstrating
  GPU programming techniques including WMMA, shared memory tiling,
  bank conflict elimination, and double buffering.
repository: LessUp/sgemm-optimization
author: LessUp

# SEO and Social
social:
  name: LessUp
  links:
    - https://github.com/LessUp

# URLs
url: "https://lessup.github.io"
baseurl: /sgemm-optimization

# Localization
lang: en

# Navigation
show_downloads: true
github:
  is_project_page: true
  repository_url: https://github.com/LessUp/sgemm-optimization
  zip_url: https://github.com/LessUp/sgemm-optimization/zipball/master
  tar_url: https://github.com/LessUp/sgemm-optimization/tarball/master

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Collections
collections:
  docs:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "docs"
      type: "pages"
    values:
      layout: default
      nav_order: 1
  - scope:
      path: "specs"
      type: "pages"
    values:
      layout: default

# Exclude from build
exclude:
  - build/
  - cmake-build-*/
  - src/
  - tests/
  - benchmarks/data/
  - .github/
  - .kiro/
  - .vscode/
  - node_modules/
  - vendor/
  - "*.cu"
  - "*.cuh"
  - "*.csv"
  - "*.o"
  - "*.so"
  - "*.a"
  - .editorconfig
  - .gitignore
  - CMakeLists.txt
  - Makefile
  - Gemfile
  - Gemfile.lock
