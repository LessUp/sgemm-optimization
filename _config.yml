title: SGEMM Optimization
description: >-
  From Naive to Tensor Core — Progressive CUDA SGEMM Optimization.
  Hand-written matrix multiplication kernels demonstrating core GPU optimization techniques.
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
repository: LessUp/sgemm-optimization
show_downloads: false

# SEO & metadata
url: https://lessup.github.io
baseurl: /sgemm-optimization
lang: zh-CN
author: LessUp

# Markdown rendering
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "changelog"
    values:
      layout: default

# Exclude irrelevant files from Jekyll build
exclude:
  - build/
  - cmake-build-*/
  - src/
  - tests/
  - .github/
  - .kiro/
  - .vscode/
  - .editorconfig
  - .gitignore
  - .clang-format
  - CMakeLists.txt
  - CMakePresets.json
  - Makefile
  - CONTRIBUTING.md
  - LICENSE
  - "*.csv"
  - "*.cu"
  - "*.cuh"
  - "*.o"
  - "*.so"
