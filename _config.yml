# SGEMM Optimization - GitHub Pages Configuration
#
# Project: CUDA SGEMM Optimization from Naive to Tensor Core
# Repository: https://github.com/LessUp/sgemm-optimization
# Pages URL: https://lessup.github.io/sgemm-optimization

# Theme
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Site info
title: SGEMM Optimization
description: >-
  Hand-written, progressively optimized CUDA matrix multiplication — the "Hello World" of HPC.
  Five kernel variants from naive triple-loop to Tensor Core WMMA.
repository: LessUp/sgemm-optimization

# URLs
url: "https://lessup.github.io"
baseurl: /sgemm-optimization

# Localization
lang: en
author: LessUp

# Navigation
show_downloads: true

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Collections
collections:
  docs:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "docs"
      type: "pages"
    values:
      layout: default
      nav_order: 1
  - scope:
      path: "specs"
      type: "pages"
    values:
      layout: default

# Exclude from build
exclude:
  - build/
  - cmake-build-*/
  - src/
  - tests/
  - benchmarks/data/
  - .github/
  - .kiro/
  - .vscode/
  - node_modules/
  - vendor/
  - "*.cu"
  - "*.cuh"
  - "*.csv"
  - "*.o"
  - "*.so"
  - "*.a"
  - .editorconfig
  - .gitignore
  - CMakeLists.txt
  - Makefile
  - Gemfile
  - Gemfile.lock
