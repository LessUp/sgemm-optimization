remote_theme: just-the-docs/just-the-docs@v0.8.2

# Theme settings
# Dark/light mode toggle is available by default in the nav bar
# Custom colors are defined in _sass/custom/custom.scss

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-default-layout

title: SGEMM Optimization
description: >-
  Learn CUDA SGEMM optimization from a readable baseline to Tensor Core WMMA,
  with verification, benchmarks, and compact engineering guidance.
repository: LessUp/sgemm-optimization
author: LessUp
lang: en

url: "https://lessup.github.io"
baseurl: "/sgemm-optimization"

search_enabled: true
heading_anchors: true
nav_sort: case_insensitive
back_to_top: true
back_to_top_text: "Back to top"
aux_links_new_tab: true

aux_links:
  "GitHub":
    - "//github.com/LessUp/sgemm-optimization"
  "README (中文)":
    - "//github.com/LessUp/sgemm-optimization/blob/master/README.zh-CN.md"

nav_external_links:
  - title: OpenSpec in repo
    url: https://github.com/LessUp/sgemm-optimization/tree/master/openspec
    hide_icon: false

copy_code:
  enabled: true
  text: "Copy"
  success_text: "Copied!"

mermaid:
  version: "10.9.0"

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
      nav_exclude: false
  - scope:
      path: "docs"
      type: "pages"
    values:
      layout: default
  - scope:
      path: "specs"
      type: "pages"
    values:
      layout: default

footer_content: >-
  Copyright &copy; 2026 LessUp.
  Distributed under <a href="https://github.com/LessUp/sgemm-optimization/blob/master/LICENSE">MIT License</a>.

exclude:
  - build/
  - cmake-build-*/
  - src/
  - tests/
  - benchmarks/data/
  - .github/
  - .vscode/
  - node_modules/
  - vendor/
  - "*.cu"
  - "*.cuh"
  - "*.csv"
  - "*.o"
  - "*.so"
  - "*.a"
  - .editorconfig
  - .gitignore
  - CMakeLists.txt
  - Makefile
  - Gemfile
  - Gemfile.lock
  - assets/README.md
  - assets/images/README.md
  - AGENTS.md
  - CLAUDE.md
  - README.zh-CN.md
  - "*.gemspec"
