# SGEMM Optimization - GitHub Pages Configuration
#
# Project: CUDA SGEMM Optimization from Naive to Tensor Core
# Repository: https://github.com/LessUp/sgemm-optimization
# Pages URL: https://lessup.github.io/sgemm-optimization

# Theme
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Site info
title: SGEMM Optimization
description: >-
  从零手写极致优化的 CUDA 矩阵乘法 — HPC 领域的 "Hello World"。
  五个渐进式优化的 kernel 变体，展示 GPU 核心优化技术。
repository: LessUp/sgemm-optimization

# URLs
url: https://lessup.github.io
baseurl: /sgemm-optimization

# Localization
lang: zh-CN
author: LessUp

# Navigation
show_downloads: false

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Exclude from build
exclude:
  - build/
  - cmake-build-*/
  - src/
  - tests/
  - .github/
  - .kiro/
  - .vscode/
  - "*.cu"
  - "*.cuh"
  - "*.csv"
  - "*.o"
  - "*.so"
  - .editorconfig
  - .gitignore
  - CMakeLists.txt
  - Makefile
